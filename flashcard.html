<head>
  <meta charset="UTF-8">

  <meta name="language" content="zh-CN">

  <link rel="canonical" href="https://learn-harness.vercel.app/flashcard.html">
  <meta property="og:title" content="闪卡复习 - Harness Engineering 工坊">
  <meta property="og:description" content="通过闪卡模式快速复习 Harness Engineering 核心概念">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://learn-harness.vercel.app/flashcard.html">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FBBF24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/minimal.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">🔬 Harness Engineering 工坊</a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="learn.html" class="nav-link">学习</a>
        <a href="flashcard.html" class="nav-link active">闪卡</a>
        <a href="roots.html" class="nav-link">索引</a>
        <a href="progress.html" class="nav-link">进度</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>闪卡复习</h1>
      <p>快速复习 Harness Engineering 核心概念</p>
    </div>

    <div class="container">
      <div class="text-center" id="progressText" style="color:var(--color-text-secondary);margin-bottom:16px;">概念 1 / 25</div>

      <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
          <div class="flashcard-front">
            <div class="flashcard-origin" id="frontOrigin">-</div>
            <div class="flashcard-root" id="frontRoot">-</div>
            <div class="flashcard-meaning" id="frontMeaning">点击翻转查看详细说明</div>
          </div>
          <div class="flashcard-back">
            <div class="flashcard-root" id="backRoot" style="font-size:1.25rem;margin-bottom:12px;">-</div>
            <div class="flashcard-description" id="backDescription">-</div>
          </div>
        </div>
      </div>

      <div class="flashcard-controls">
        <button class="btn btn-secondary" id="prevBtn" onclick="prevCard()">← 上一张</button>
        <div style="text-align:center;">
          <button class="btn btn-ghost" onclick="shuffleCards()" title="随机顺序" style="font-size:0.875rem;">随机</button>
          <button class="btn btn-ghost" id="masterBtn" onclick="toggleMaster()" title="标记掌握" style="font-size:0.875rem;">☆ 标记掌握</button>
        </div>
        <button class="btn btn-secondary" id="nextBtn" onclick="nextCard()">下一张 →</button>
      </div>

      <div class="flashcard-progress">
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- 筛选 -->
      <div style="text-align:center;margin-top:24px;">
        <div class="filter-group">
          <button class="filter-btn active" onclick="filterCards('all', this)">全部概念</button>
          <button class="filter-btn" onclick="filterCards('unmastered', this)">未掌握</button>
          <button class="filter-btn" onclick="filterCards('mastered', this)">已掌握</button>
          <button class="filter-btn" onclick="filterCards('random', this)">随机5张</button>
        </div>
      </div>

      <div class="keyboard-hint">
        <kbd>←</kbd> 上一个 &nbsp; <kbd>空格</kbd> 翻转 &nbsp; <kbd>→</kbd> 下一个 &nbsp; <kbd>M</kbd> 标记掌握
      </div>
    </div>
  </main>

  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    (function() {
      var currentCards = WordRoots.slice();
      var currentIndex = 0;

      function loadCard(index) {
        if (currentCards.length === 0) {
          document.getElementById('flashcard').innerHTML = '<div style="text-align:center;padding:40px;"><h3>没有符合条件的概念</h3><p style="color:var(--color-text-secondary)">请选择其他筛选条件</p></div>';
          return;
        }
        var safeIndex = ((index % currentCards.length) + currentCards.length) % currentCards.length;
        currentIndex = safeIndex;
        var root = currentCards[safeIndex];
        var mastered = isMastered(root.id);

        var card = document.getElementById('flashcard');
        if (card) card.classList.remove('flipped');

        document.getElementById('frontRoot').textContent = root.root;
        document.getElementById('frontMeaning').textContent = root.meaning;
        document.getElementById('frontOrigin').textContent = root.origin;
        document.getElementById('backRoot').textContent = root.root;
        document.getElementById('backDescription').textContent = root.description;

        var masterBtn = document.getElementById('masterBtn');
        if (masterBtn) {
          masterBtn.textContent = mastered ? '★ 已掌握' : '☆ 标记掌握';
          masterBtn.style.color = mastered ? 'var(--color-accent-dark)' : 'var(--color-text-secondary)';
        }

        document.getElementById('progressText').textContent = '概念 ' + (safeIndex + 1) + ' / ' + currentCards.length;
        var bar = document.getElementById('progressBar');
        if (bar) bar.style.width = ((safeIndex + 1) / currentCards.length * 100) + '%';

        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        prevBtn.disabled = currentIndex === 0;
        prevBtn.style.opacity = currentIndex === 0 ? '0.5' : '1';
        nextBtn.disabled = currentIndex === currentCards.length - 1;
        nextBtn.style.opacity = currentIndex === currentCards.length - 1 ? '0.5' : '1';
      }

      window.flipCard = function() {
        var card = document.getElementById('flashcard');
        if (card) card.classList.toggle('flipped');
      };

      window.nextCard = function() { if (currentIndex < currentCards.length - 1) loadCard(currentIndex + 1); };
      window.prevCard = function() { if (currentIndex > 0) loadCard(currentIndex - 1); };

      window.toggleMaster = function() {
        if (currentCards.length === 0) return;
        var root = currentCards[currentIndex];
        var mastered = isMastered(root.id);
        saveMastered(root.id, !mastered);
        loadCard(currentIndex);
      };

      window.shuffleCards = function() {
        for (var i = currentCards.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = currentCards[i]; currentCards[i] = currentCards[j]; currentCards[j] = tmp;
        }
        currentIndex = 0;
        loadCard(0);
      };

      window.filterCards = function(type, el) {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        if (el) el.classList.add('active');

        var masteredItems = loadMasteredItems();
        switch (type) {
          case 'all': currentCards = WordRoots.slice(); break;
          case 'mastered': currentCards = WordRoots.filter(function(item) { return masteredItems.includes(item.id); }); break;
          case 'unmastered': currentCards = WordRoots.filter(function(item) { return !masteredItems.includes(item.id); }); break;
          case 'random':
            var shuffled = WordRoots.slice().sort(function() { return Math.random() - 0.5; });
            currentCards = shuffled.slice(0, 5);
            break;
        }
        currentIndex = 0;
        loadCard(0);
      };

      document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft') { e.preventDefault(); window.prevCard(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); window.nextCard(); }
        if (e.key === ' ') { e.preventDefault(); window.flipCard(); }
        if (e.key === 'm' || e.key === 'M') { e.preventDefault(); window.toggleMaster(); }
      });

      loadCard(0);
    })();
  </script>
</body>
</html>

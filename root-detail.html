<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">概念详情 - Harness Engineering 工坊</title>
  <meta name="description" content="深入了解 Harness Engineering 核心概念的详细说明、应用实例和测试题目。" id="pageDescription">
  <meta name="keywords" content="Harness Engineering,概念详情,应用实例,测试">
  <meta name="author" content="Harness Engineering 工坊">
  <meta name="language" content="zh-CN">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://learn-harness.vercel.app/root-detail.html" id="canonicalUrl">
  <meta property="og:title" content="概念详情 - Harness Engineering 工坊" id="ogTitle">
  <meta property="og:description" content="深入了解 Harness Engineering 核心概念" id="ogDescription">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://learn-harness.vercel.app/root-detail.html" id="ogUrl">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FBBF24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/minimal.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">🔬 Harness Engineering 工坊</a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="learn.html" class="nav-link">学习</a>
        <a href="flashcard.html" class="nav-link">闪卡</a>
        <a href="roots.html" class="nav-link">索引</a>
        <a href="progress.html" class="nav-link">进度</a>
      </div>
    </div>
  </nav>

  <main class="detail-container">
    <button class="btn btn-ghost" onclick="goBack()" style="margin-bottom:24px;">← 返回</button>

    <div id="detailContent"></div>

    <!-- 相关概念推荐 -->
    <div id="relatedSection" style="margin-top:48px;">
      <h3 style="font-size:1.25rem;font-weight:600;margin-bottom:20px;">相关概念</h3>
      <div class="roots-grid" id="relatedItems"></div>
    </div>

    <div style="text-align:center;margin-top:48px;">
      <a href="learn.html" class="btn btn-primary">进入学习模式</a>
      <a href="flashcard.html" class="btn btn-secondary" style="margin-left:12px;">闪卡复习</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var rootId = parseInt(params.get('id'));
      var currentRoot = null;
      var quizAnswered = false;

      function showToast(message) {
        var toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2000);
      }

      window.goBack = function() {
        if (document.referrer && document.referrer.indexOf(window.location.host) >= 0) {
          history.back();
        } else {
          window.location.href = 'roots.html';
        }
      };

      function updatePageMeta(item) {
        var title = item.root + ' - Harness Engineering 工坊';
        var description = item.meaning + '。' + item.description.substring(0, 150) + '...';
        var url = 'https://learn-harness.vercel.app/root-detail.html?id=' + item.id;
        document.title = title;
        var descEl = document.getElementById('pageDescription');
        if (descEl) descEl.setAttribute('content', description);
        var canonEl = document.getElementById('canonicalUrl');
        if (canonEl) canonEl.href = url;
        var ogTitleEl = document.getElementById('ogTitle');
        if (ogTitleEl) ogTitleEl.setAttribute('content', title);
        var ogDescEl = document.getElementById('ogDescription');
        if (ogDescEl) ogDescEl.setAttribute('content', description);
        var ogUrlEl = document.getElementById('ogUrl');
        if (ogUrlEl) ogUrlEl.setAttribute('content', url);
      }

      function renderDetail(item) {
        if (!item) {
          document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:48px 0;"><h2>概念未找到</h2><p style="color:var(--color-text-secondary)">请检查URL或返回索引</p><a href="roots.html" class="btn btn-primary" style="margin-top:16px;">返回索引</a></div>';
          return;
        }
        currentRoot = item;
        updatePageMeta(item);
        markItemVisited(item.id);

        var mastered = isMastered(item.id);
        var html = '<div class="learn-header">' +
          '<div class="learn-meta"><span class="root-origin">' + item.origin + '</span>' +
          '<span class="mastered-badge" id="masteredBadge" style="display:' + (mastered ? 'inline-block' : 'none') + ';">✓ 已掌握</span></div>' +
          '<h1 class="learn-title" style="margin-top:12px;">' + item.root + '</h1>' +
          '<div class="detail-meaning">' + item.meaning + '</div>' +
          '</div>' +
          '<div class="learn-section"><h3>详细说明</h3><p class="learn-description">' + item.description + '</p></div>' +
          '<div class="learn-section"><h3>实践案例</h3><div id="examplesContainer"></div></div>';

        if (item.quiz) {
          html += '<div class="quiz-section"><h3 style="margin-bottom:16px;">知识测试</h3>' +
            '<p class="quiz-question">' + item.quiz.question + '</p>' +
            '<div class="quiz-options" id="quizOptions"></div>' +
            '<div class="quiz-result hidden" id="quizResult"></div></div>';
        }

        html += '<div style="text-align:center;margin-top:32px;">' +
          '<button class="btn ' + (mastered ? 'btn-secondary' : 'btn-success') + '" onclick="toggleMaster()">' +
          (mastered ? '★ 已掌握' : '☆ 标记掌握') + '</button></div>';

        document.getElementById('detailContent').innerHTML = html;

        // 渲染案例
        var container = document.getElementById('examplesContainer');
        if (container) {
          item.examples.forEach(function(ex) {
            var card = document.createElement('div');
            card.className = 'example-card';
            card.innerHTML = '<div class="example-word">' + ex.word + '</div>' +
              '<div class="example-meaning">' + ex.meaning + '</div>' +
              '<div class="example-explanation">' + ex.explanation + '</div>';
            container.appendChild(card);
          });
        }

        // 渲染 quiz
        if (item.quiz) {
          quizAnswered = false;
          var optionsEl = document.getElementById('quizOptions');
          if (optionsEl) {
            item.quiz.options.forEach(function(option, index) {
              var btn = document.createElement('button');
              btn.className = 'quiz-option';
              btn.textContent = String.fromCharCode(65 + index) + '. ' + option;
              btn.onclick = function() { selectOption(index); };
              optionsEl.appendChild(btn);
            });
          }
        }
      }

      window.selectOption = function(selectedIndex) {
        if (quizAnswered || !currentRoot) return;
        var options = document.querySelectorAll('.quiz-option');
        var result = document.getElementById('quizResult');
        var correctIndex = currentRoot.quiz.correctAnswer;

        options[selectedIndex].classList.add('selected');
        setTimeout(function() {
          options[correctIndex].classList.add('correct');
          if (selectedIndex !== correctIndex) options[selectedIndex].classList.add('wrong');
          var isCorrect = selectedIndex === correctIndex;
          if (result) {
            result.className = 'quiz-result ' + (isCorrect ? 'correct' : 'incorrect');
            result.textContent = isCorrect ? '✓ 回答正确！' : '✗ 回答错误。正确答案是 ' + String.fromCharCode(65 + correctIndex);
          }
          saveQuizResult(currentRoot.id, isCorrect, selectedIndex, correctIndex);
          quizAnswered = true;
          // 回答正确自动标记为已掌握
          if (isCorrect && !isMastered(currentRoot.id)) {
            saveMastered(currentRoot.id, true);
            showToast('已自动标记为已掌握 ✓');
            // 刷新页面UI显示已掌握状态
            var badge = document.getElementById('masteredBadge');
            if (badge) badge.style.display = 'inline-block';
          }
        }, 300);
      };

      window.toggleMaster = function() {
        if (!currentRoot) return;
        var mastered = isMastered(currentRoot.id);
        saveMastered(currentRoot.id, !mastered);
        renderDetail(currentRoot);
        renderRelatedItems(currentRoot);
      };

      function renderRelatedItems(item) {
        if (!item) return;
        var related = WordRoots.filter(function(r) { return r.id !== item.id && r.origin === item.origin; }).slice(0, 3);
        var section = document.getElementById('relatedSection');
        var container = document.getElementById('relatedItems');
        if (related.length === 0) { if (section) section.style.display = 'none'; return; }
        if (section) section.style.display = 'block';
        if (container) {
          container.innerHTML = '';
          related.forEach(function(root) {
            var mastered = isMastered(root.id);
            var card = document.createElement('div');
            card.className = 'root-card' + (mastered ? ' mastered' : '');
            card.onclick = function() { window.location.href = 'root-detail.html?id=' + root.id; };
            card.innerHTML = '<div class="root-name">' + (mastered ? '★ ' : '') + root.root + '</div>' +
              '<div class="root-meaning">' + root.meaning + '</div>' +
              '<div style="margin-top:12px;"><span class="root-origin">' + root.origin + '</span></div>';
            container.appendChild(card);
          });
        }
      }

      // 键盘导航
      document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'Escape') goBack();
        if (e.key === 'm' || e.key === 'M') { e.preventDefault(); toggleMaster(); }
        if (e.key === 'ArrowLeft' && currentRoot && currentRoot.id > 1) {
          window.location.href = 'root-detail.html?id=' + (currentRoot.id - 1);
        }
        if (e.key === 'ArrowRight' && currentRoot && currentRoot.id < WordRoots.length) {
          window.location.href = 'root-detail.html?id=' + (currentRoot.id + 1);
        }
      });

      var item = WordRoots.find(function(r) { return r.id === rootId; });
      renderDetail(item);
      renderRelatedItems(item);
    })();
  </script>
</body>
</html>
